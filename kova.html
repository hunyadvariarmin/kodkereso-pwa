<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kova túrák</title>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
                url("icons/logo.png") no-repeat center center fixed;
    background-size: cover;
    display:flex;
    flex-direction:column;
    align-items:center;
    color:white;
}

/* Tartalom */
#mainContainer{
    margin-top:80px;
    width:90%;
    max-width:500px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* Select */
select{
    width:100%;
    padding:18px;
    font-size:22px;
    border-radius:12px;
    border:2px solid #FFD700;
    background:rgba(0,0,0,0.5);
    color:#FFD700;
    outline:none;
}

/* Megnyitás gomb */
#openButton{
    padding:18px;
    font-size:24px;
    border-radius:12px;
    border:2px solid #FFD700;
    background:rgba(0,0,0,0.4);
    color:#FFD700;
    cursor:pointer;
    transition:0.3s;
}

#openButton:hover{
    background:rgba(255,215,0,0.2);
    transform:scale(1.03);
}

/* Alsó gombok */
#bottomActions{
    position:absolute;
    bottom:40px;
    display:flex;
    gap:20px;
    width:90%;
    max-width:500px;
}

#bottomActions button{
    flex:1;
    padding:14px;
    font-size:20px;
    border-radius:12px;
    border:2px solid #FFD700;
    background:rgba(0,0,0,0.4);
    color:#FFD700;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="mainContainer">

    <!-- Legördülő -->
    <select id="tourSelect">
        <option value="">Válassz túrát...</option>
    </select>

    <!-- Megnyit -->
    <button id="openButton">
        Megnyitás
    </button>

</div>

<div id="bottomActions">
    <button id="backButton">Vissza</button>
    <button id="refreshButton">Frissít</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

const XLSX_URL = "https://raw.githubusercontent.com/hunyadvariarmin/kodkereso-pwa/main/1.xlsx";

/* DONE */
const DONE_KEYS = [
"done_K-2","done_K-3","done_K-4","done_K-5","done_K-6","done_K-7",
"done_K-8","done_K-9","done_K-10","done_K-11","done_K-12","done_K-15",
"done_K-17","done_K-18","done_K-20","done_K-21","done_K-22","done_K-23",
"done_K-29","done_K-30","done_K-31","done_K-32","done_K-33","done_K-39",
"done_K-41","done_K-42","done_K-43","done_K-44","done_K-51","done_K-52",
"done_K-53","done_K-61","done_K-62","done_K-63","done_K-71","done_K-72",
"done_K-73","done_K-74","done_K-75","done_K-81","done_K-82","done_K-83",
"done_K-84","done_K-91","done_K-92","done_K-98","done_K-99","done_K-110",
"done_K-111"
];

/* SESSION */
const SCAN_KEYS = [
"K-2_scannedList","K-3_scannedList","K-4_scannedList","K-5_scannedList",
"K-6_scannedList","K-7_scannedList","K-8_scannedList","K-9_scannedList",
"K-10_scannedList","K-11_scannedList","K-12_scannedList","K-15_scannedList",
"K-17_scannedList","K-18_scannedList","K-20_scannedList","K-21_scannedList",
"K-22_scannedList","K-23_scannedList","K-29_scannedList","K-30_scannedList",
"K-31_scannedList","K-32_scannedList","K-33_scannedList","K-39_scannedList",
"K-41_scannedList","K-42_scannedList","K-43_scannedList","K-44_scannedList",
"K-51_scannedList","K-52_scannedList","K-53_scannedList","K-61_scannedList",
"K-62_scannedList","K-63_scannedList","K-71_scannedList","K-72_scannedList",
"K-73_scannedList","K-74_scannedList","K-75_scannedList","K-81_scannedList",
"K-82_scannedList","K-83_scannedList","K-84_scannedList","K-91_scannedList",
"K-92_scannedList","K-98_scannedList","K-99_scannedList","K-110_scannedList",
"K-111_scannedList"
];

/* Dropdown feltöltés */
async function loadToursFromExcel(){

    const select = document.getElementById("tourSelect");

    let tours = new Set();

    try{

        const resp = await fetch(XLSX_URL);

        const buffer = await resp.arrayBuffer();

        const wb = XLSX.read(buffer,{type:"array"});

        const sheet = wb.Sheets[wb.SheetNames[0]];

        const data = XLSX.utils.sheet_to_json(sheet,{header:1});

        for(let i=1;i<data.length;i++){

            const row = data[i] || [];

            const val = row[2];

            if(val == null) continue;

            let norm = String(val).trim().toUpperCase();

            if(!norm.startsWith("K-")) continue;

            norm = norm.replace(/\s+/g,"");

            const numStr = norm.slice(2).replace("-","");

            if(!/^\d+$/.test(numStr)) continue;

            const rawNum = parseInt(numStr,10);

            let baseNum;

            if(rawNum >= 9000){
                baseNum = rawNum - 9000;
            }
            else if(rawNum >= 900){
                baseNum = rawNum - 900;
            }
            else{
                baseNum = rawNum;
            }

            tours.add("K-" + baseNum);
        }

        /* rendezés */
        const sortedTours = Array.from(tours).sort((a,b)=>{
            return parseInt(a.split("-")[1]) - parseInt(b.split("-")[1]);
        });

        sortedTours.forEach(tour=>{

            const option = document.createElement("option");

            option.value = tour;

            option.textContent = tour;

            /* DONE zöld jel */
            if(localStorage.getItem("done_" + tour) === "true"){
                option.textContent += " ✅";
            }

            select.appendChild(option);
        });

    }catch(e){

        console.error("Excel hiba:",e);
    }
}

/* Megnyitás */
document.getElementById("openButton").addEventListener("click",()=>{

    const selected = document.getElementById("tourSelect").value;

    if(!selected){
        alert("Válassz túrát!");
        return;
    }

    window.location.href = selected + ".html";
});

/* Vissza */
document.getElementById("backButton").addEventListener("click",()=>{

    window.location.href = "arukiadas.html";
});

/* Frissít */
document.getElementById("refreshButton").addEventListener("click",()=>{

    const ok = confirm("Biztosan törlöd az összes jelölést és beolvasott kódot?");

    if(!ok) return;

    DONE_KEYS.forEach(k=>localStorage.removeItem(k));

    SCAN_KEYS.forEach(k=>sessionStorage.removeItem(k));

    location.reload();
});

window.addEventListener("DOMContentLoaded",()=>{

    loadToursFromExcel();
});
</script>

</body>
</html>
