<!-- XLSX a táblázat olvasásához -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
// Excel fájl
const XLSX_URL = "https://raw.githubusercontent.com/hunyadvariarmin/kodkereso-pwa/main/1.xlsx";

// DONE jelölések – a SZ-*.html oldalakban: done_SZ-...
const DONE_KEYS = [
 "done_K-2","done_K-3","done_K-4","done_K-5","done_K-6","done_K-7",
"done_K-8","done_K-9","done_K-10","done_K-11","done_K-12","done_K-15",
"done_K-17","done_K-18","done_K-20","done_K-21","done_K-22","done_K-23",
"done_K-29","done_K-30","done_K-31","done_K-32","done_K-33","done_K-39",
"done_K-41","done_K-42","done_K-43","done_K-44","done_K-51","done_K-52",
"done_K-53","done_K-61","done_K-62","done_K-63","done_K-71","done_K-72",
"done_K-73","done_K-74","done_K-75","done_K-81","done_K-82","done_K-83",
"done_K-84","done_K-91","done_K-92","done_K-98","done_K-99","done_K-110",
"done_K-111"
];

// Scanned kulcsok – a SZ-*.html oldalakban: TOUR_ID + "_scannedList"
const SCAN_KEYS = [
 "K-2_scannedList","K-3_scannedList","K-4_scannedList","K-5_scannedList",
"K-6_scannedList","K-7_scannedList","K-8_scannedList","K-9_scannedList",
"K-10_scannedList","K-11_scannedList","K-12_scannedList","K-15_scannedList",
"K-17_scannedList","K-18_scannedList","K-20_scannedList","K-21_scannedList",
"K-22_scannedList","K-23_scannedList","K-29_scannedList","K-30_scannedList",
"K-31_scannedList","K-32_scannedList","K-33_scannedList","K-39_scannedList",
"K-41_scannedList","K-42_scannedList","K-43_scannedList","K-44_scannedList",
"K-51_scannedList","K-52_scannedList","K-53_scannedList","K-61_scannedList",
"K-62_scannedList","K-63_scannedList","K-71_scannedList","K-72_scannedList",
"K-73_scannedList","K-74_scannedList","K-75_scannedList","K-81_scannedList",
"K-82_scannedList","K-83_scannedList","K-84_scannedList","K-91_scannedList",
"K-92_scannedList","K-98_scannedList","K-99_scannedList","K-110_scannedList",
"K-111_scannedList"
];

/* Zöld jelölés (DONE) */
function applyDoneStyles() {
    const buttons = document.querySelectorAll('#buttonsContainer button');
    buttons.forEach(btn => {
        btn.style.backgroundColor = "rgba(0,0,0,0.4)";
        btn.style.borderColor = "#FFD700";
        btn.style.color = "#FFD700";
    });

    DONE_KEYS.forEach(key => {
        if (localStorage.getItem(key) === "true") {
            const code = key.replace("done_",""); // pl. done_SZ-2 -> SZ-2
            const btn = document.querySelector(`button[data-code="${code}"]`);
            if (btn) {
                btn.style.backgroundColor = "rgba(0,128,0,0.7)";
                btn.style.borderColor = "#00ff00";
                btn.style.color = "#ffffff";
            }
        }
    });
}

/* Csak azok a gombok látszanak, amelyekre van túra az Excel C oszlopában
   - ha C-ben SZ-2      -> SZ-2 gomb
   - ha C-ben SZ-802    -> SZ-2 gomb  (802-800)
   - ha C-ben SZ-835    -> SZ-35 gomb (835-800)
   - ha C-ben SZ-8101   -> SZ-101 gomb (8101-8000)
   - ha C-ben SZ-860    -> SZ-60 gomb (860-800)
*/
async function updateButtonsVisibilityFromExcel() {
    let excelBaseTours = new Set();

    try {
        const resp = await fetch(XLSX_URL);
        const buffer = await resp.arrayBuffer();
        const wb = XLSX.read(buffer, { type: "array" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        for (let i = 1; i < data.length; i++) {
            const row = data[i] || [];
            const val = row[2]; // C oszlop
            if (val == null) continue;

            let norm = String(val).trim().toUpperCase();

            // MOST MÁR K- TÚRÁKAT KERESÜNK
            if (!norm.startsWith("K-")) continue;

            norm = norm.replace(/\s+/g, "");

            // pl K-918 -> 918
            const numStr = norm.slice(2);

            if (!/^\d+$/.test(numStr)) continue;

            const rawNum = parseInt(numStr, 10);
            if (isNaN(rawNum)) continue;

            let baseNum;

            // 9101 -> 101
            if (rawNum >= 9000) {
                baseNum = rawNum - 9000;
            }
            // 918 -> 18
            // 961 -> 61
            else if (rawNum >= 900) {
                baseNum = rawNum - 900;
            }
            // sima K-18 -> 18
            else {
                baseNum = rawNum;
            }

            // pl K-18
            const baseCode = "K-" + baseNum;

            excelBaseTours.add(baseCode.toUpperCase());
        }

    } catch (e) {
        console.error("Excel betöltési hiba:", e);
        return;
    }

    // ha nincs találat, marad minden látható
    if (excelBaseTours.size === 0) {
        console.warn("Nem találtam K túrákat az Excelben.");
        return;
    }

    const buttons = document.querySelectorAll('#buttonsContainer button');

    buttons.forEach(btn => {
        const code = btn.getAttribute("data-code");
        if (!code) return;

        if (excelBaseTours.has(code.toUpperCase())) {
            btn.style.display = "";
        } else {
            btn.style.display = "none";
        }
    });
}

window.addEventListener("DOMContentLoaded", () => {
    applyDoneStyles();
    updateButtonsVisibilityFromExcel();

    document.getElementById("backButton").addEventListener("click", () => {
        window.location.href = "arukiadas.html";
    });

    document.getElementById("refreshButton").addEventListener("click", () => {
        const ok = confirm("Biztosan törlöd az összes jelölést és beolvasott kódot?");
        if (!ok) return;

        DONE_KEYS.forEach(k => localStorage.removeItem(k));
        SCAN_KEYS.forEach(k => sessionStorage.removeItem(k));

        applyDoneStyles();
    });
});
</script>
